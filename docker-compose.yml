services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ro_pvp
      POSTGRES_USER: ro_pvp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
